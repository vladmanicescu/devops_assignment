# Example PlatformConfig — EKS on AWS (Terraform: providers/aws/eks/terraform).
# Validate against platform/schema/v1/platform-config.schema.json

apiVersion: platform.dev/v1
kind: PlatformConfig

metadata:
  name: pocket
  environment: lab
  labels:
    team: platform

provider: aws

kubernetes:
  backend: eks
  version: "1.31"
  network:
    vpc_cidr: 10.40.0.0/16
    availability_zone: eu-central-1a
  aws:
    region: eu-central-1
    profile: default
    eks:
      cluster_name: pocket-eks
      endpoint_public_access: true

platform:
  ingress:
    class: nginx
  storage:
    nfs:
      enabled: false
  vault:
    enabled: true
    # replicas: 1
    # data_storage_size: "10Gi"
  gitlab:
    enabled: true
    install_mode: helm
    # hostname: gitlab.example.com        # optional — omit to use the NLB auto-hostname
    # tls: true                           # optional — enable TLS via cert-manager
    # tls_mode: letsencrypt               # letsencrypt (default, requires hostname+DNS) | self_signed (dev, no domain needed)
    # route53_zone_id: Z1234567890ABC     # optional — auto-creates CNAME in Route 53 (requires hostname)
    runner:
      enabled: true
      concurrent: 4
      # job_cpu_request: 100m
      # job_memory_request: 128Mi
      # job_cpu_limit: 500m
      # job_memory_limit: 512Mi
